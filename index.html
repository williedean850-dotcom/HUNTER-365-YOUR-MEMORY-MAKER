<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunter 365 - Your Memory Maker</title>
<style>
:root{--red:#e6231e;--panel:#121217;--pb:#262630;--txt:#f2f2f0;--dim:#9a9aa3;}
*{box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:radial-gradient(circle at 50% 0%,#1a0a0a,#07070a 55%);color:var(--txt);margin:0;padding:0;min-height:100vh;}
.wrap{max-width:460px;margin:0 auto;padding:18px 16px 40px;}
h1{font-size:22px;text-align:center;margin:10px 0 4px;}
.tag{text-align:center;font-size:14px;color:var(--dim);margin:0 0 20px;}
.section{background:var(--panel);border:1px solid var(--pb);border-radius:12px;padding:16px;margin-bottom:16px;}
.section h2{font-size:15px;margin:0 0 12px;color:var(--red);}
.photos{display:flex;gap:10px;}
.pslot{flex:1;aspect-ratio:1;background:#1a1a20;border:2px dashed var(--pb);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--dim);cursor:pointer;position:relative;overflow:hidden;}
.pslot img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
.pslot input{display:none;}
  textarea{width:100%;min-height:90px;padding:12px;background:#1a1a20;color:var(--txt);border-radius:10px;border:1px solid var(--pb);font-size:15px;font-family:inherit;resize:vertical;margin-bottom:12px;}
.genbtn{width:100%;padding:13px;border:none;border-radius:10px;background:var(--red);color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
.out{background:#1a1a20;border:1px solid var(--pb);padding:14px;border-radius:10px;font-size:14px;line-height:1.6;margin-top:12px;}
.out.mt{color:var(--dim);font-style:italic;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Hunter 365</h1>
  <p class="tag">Your Memory Maker</p>

  <div class="section">
    <h2>Reference Photos (up to 3)</h2>
    <div class="photos">
      <label class="pslot"><span id="p1t">+</span><img id="p1" style="display:none"><input type="file" id="p1i" accept="image/*" onchange="loadPhoto(1)"></label>
      <label class="pslot"><span id="p2t">+</span><img id="p2" style="display:none"><input type="file" id="p2i" accept="image/*" onchange="loadPhoto(2)"></label>
      <label class="pslot"><span id="p3t">+</span><img id="p3" style="display:none"><input type="file" id="p3i" accept="image/*" onchange="loadPhoto(3)"></label>
    </div>
  </div>

  <div class="section">
    <h2>Describe Your Image</h2>
    <textarea id="descI" placeholder="Describe exactly what you want the final image to look like..." maxlength="2000"></textarea>
    <button class="genbtn" id="genB" onclick="generateImg()">Generate</button>
    <div id="genO" class="out mt">Your AI image will appear here.</div>
  </div>

</div>


<script>
function loadPhoto(n){
  var f=document.getElementById("p"+n+"i").files[0];
  if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    document.getElementById("p"+n).src=e.target.result;
    document.getElementById("p"+n).style.display="block";
    document.getElementById("p"+n+"t").style.display="none";
  };
  r.readAsDataURL(f);
}
</script>
</body>
</html>
